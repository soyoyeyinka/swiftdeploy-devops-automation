services:
  app:
    image: swift-deploy-1-node:latest
    container_name: swiftdeploy-app
    restart: unless-stopped
    environment:
      MODE: "stable"
      APP_VERSION: "1.0.0"
      APP_PORT: "3000"
    expose:
      - "3000"
    networks:
      - swiftdeploy-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
    restart: unless-stopped
    user: "101:101"
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - swiftdeploy-logs:/tmp/swiftdeploy-logs
    depends_on:
      app:
        condition: service_healthy
    networks:
      - swiftdeploy-network
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  swiftdeploy-network:
    name: swiftdeploy-net
    driver: bridge

volumes:
  swiftdeploy-logs:
    name: swiftdeploy-logs
