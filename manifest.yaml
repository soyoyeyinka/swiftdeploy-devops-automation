project:
  name: swiftdeploy
  version: "1.0.0"
  contact: "soyoyeolayinka35@gmail.com"

services:
  name: swiftdeploy-app
  image: swift-deploy-1-node:latest
  port: 3000
  mode: stable
  app_version: "1.0.0"
  restart_policy: unless-stopped

nginx:
  image: nginx:latest
  port: 8080
  proxy_timeout: 10

network:
  name: swiftdeploy-net
  driver_type: bridge

logs:
  volume_name: swiftdeploy-logs


policy:
  opa_url: http://localhost:8181
  infrastructure:
    min_disk_free_gb: 10
    max_cpu_load: 2.0
  canary:
    max_error_rate: 0.01
    max_p99_latency_seconds: 0.5
    window_seconds: 30
